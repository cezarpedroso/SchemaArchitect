name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Restore, build, and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore SchemaArchitect.sln

      - name: Build
        run: dotnet build SchemaArchitect.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SchemaArchitect.sln --configuration Release --no-build --verbosity normal
