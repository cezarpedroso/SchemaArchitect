name: Build and deploy ASP.NET Core app to Azure Web App - schemarchitect

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  WEB_PROJECT_PATH: SchemaArchitect.Web/SchemaArchitect.Web.csproj
  PUBLISH_DIR: ./publish

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Restore
        run: dotnet restore SchemaArchitect.sln

      - name: Build
        run: dotnet build ${{ env.WEB_PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.WEB_PROJECT_PATH }} -c Release -o ${{ env.PUBLISH_DIR }}

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0B93AD14E0F940E2BDFAC577A29CE99C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_CBEEA8D558494754A97EF6A30DC741B0 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B8649328F02C4F86A9F07F6891CBD4AC }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'schemarchitect'
          slot-name: 'Production'
          package: ./publish
